<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Preview</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="panel-header">
    <div class="brand">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="4" width="13" height="16" rx="2"/>
          <rect x="14" y="9" width="7" height="11" rx="1.6" fill="var(--panel-bg, #fff)"/>
          <rect x="14" y="9" width="7" height="11" rx="1.6"/>
        </svg>
      </span>
      <div class="brand-text">
        <h1>Device Preview</h1>
        <p>Escolha um dispositivo para visualizar o site da aba atual</p>
      </div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </svg>
      <input id="search" type="search" placeholder="Buscar dispositivo…" autocomplete="off">
    </div>
  </header>

  <div id="panelError" class="panel-error hidden" role="alert"></div>

  <main id="groups" aria-label="Categorias de dispositivos"></main>

  <footer class="panel-footer">
    A prévia abre em uma nova guia, com moldura realista.
    <span class="credit">Desenvolvido por Lucas Caldeira</span>
  </footer>

  <script src="../shared/icons.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
