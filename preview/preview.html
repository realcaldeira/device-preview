<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Device Preview</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body data-theme="dark">

  <header id="toolbar">
    <div class="tb-group">
      <select id="deviceSelect" aria-label="Trocar dispositivo" title="Trocar dispositivo"></select>
      <button id="rotateBtn" class="icon-btn" title="Girar (retrato/paisagem)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="7" y="3" width="10" height="18" rx="2"/>
          <path d="M3 8a9 9 0 0 1 2-3M21 16a9 9 0 0 1-2 3"/>
        </svg>
      </button>
      <button id="framelessBtn" class="icon-btn" aria-pressed="false"
              title="Tela cheia: oculta a moldura e exibe só a tela, na resolução do dispositivo (mantém a proporção)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      </button>
      <button id="stretchBtn" class="icon-btn" aria-pressed="false"
              title="Esticar: preenche toda a janela distorcendo a proporção (ativa a tela cheia)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h18"/>
          <path d="M7 8l-4 4 4 4"/>
          <path d="M17 8l4 4-4 4"/>
        </svg>
      </button>
    </div>

    <div class="tb-group grow">
      <button id="backBtn" class="icon-btn" title="Voltar" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <button id="reloadBtn" class="icon-btn" title="Recarregar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/>
        </svg>
      </button>
      <input id="addressInput" type="text" spellcheck="false" autocomplete="off"
             aria-label="Endereço do site (URL)"
             placeholder="Digite a URL e pressione Enter">
      <button id="goBtn" class="text-btn" title="Navegar para a URL">Ir</button>
    </div>

    <div class="tb-group">
      <button id="zoomOutBtn" class="icon-btn" title="Reduzir zoom">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M5 12h14"/>
        </svg>
      </button>
      <button id="zoomFitBtn" class="text-btn" title="Ajustar à janela">Ajustar</button>
      <span id="zoomLabel" title="Zoom atual">100%</span>
      <button id="zoomInBtn" class="icon-btn" title="Aumentar zoom">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
      <span class="tb-sep"></span>
      <button id="themeBtn" class="icon-btn" title="Alternar tema claro/escuro">
        <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
        </svg>
        <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="hidden">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </button>
      <button id="fpsBtn" class="text-btn" aria-pressed="false"
              title="Medidor de FPS: mede os quadros por segundo do site embutido (usa o protocolo de depuração; o Chrome exibirá um aviso enquanto estiver ativo).">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h4l2 6 4-14 2 8h6"/>
        </svg>
        FPS
      </button>
      <button id="shotBtn" class="text-btn primary" title="Capturar imagem do mockup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2Z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Capturar
      </button>
      <span class="tb-sep"></span>
      <button id="exitBtn" class="text-btn danger" title="Sair da prévia e voltar ao site normal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <path d="M16 17l5-5-5-5"/>
          <path d="M21 12H9"/>
        </svg>
        Sair
      </button>
    </div>
  </header>

  <main id="stage">
    <div id="zoomBox">
      <div id="mockup" data-cutout="punch" data-kind="phone" data-platform="android"
           data-brand="android" data-buttons="right" data-orientation="portrait">
        <div class="device-frame" id="frame">
          <span class="hw-btn btn-power"></span>
          <span class="hw-btn btn-volup"></span>
          <span class="hw-btn btn-voldown"></span>
          <span class="hw-btn btn-mute"></span>
          <span class="earpiece"></span>
          <span class="front-cam"></span>

          <div class="screen">
            <div class="status-bar" id="statusBar">
              <span class="sb-left"><span id="sbTime">9:41</span></span>
              <span class="sb-right">
                <span class="sb-set sb-ios">
                  <svg class="sb-ic" width="18" height="11" viewBox="0 0 18 11" fill="currentColor">
                    <rect x="0" y="7.5" width="3" height="3.5" rx="0.8"/>
                    <rect x="4.7" y="5.5" width="3" height="5.5" rx="0.8"/>
                    <rect x="9.4" y="3" width="3" height="8" rx="0.8"/>
                    <rect x="14.1" y="0.5" width="3" height="10.5" rx="0.8"/>
                  </svg>
                  <span class="sb-net">5G</span>
                  <svg class="sb-ic" width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
                    <path d="M1.2 4.3a9 9 0 0 1 12.6 0L12.5 5.7a7.1 7.1 0 0 0-10 0Z"/>
                    <path d="M3.9 7a5.2 5.2 0 0 1 7.2 0L9.7 8.4a3.2 3.2 0 0 0-4.4 0Z"/>
                    <circle cx="7.5" cy="9.6" r="1.4"/>
                  </svg>
                  <svg class="sb-ic" width="25" height="12" viewBox="0 0 25 12">
                    <rect x="0.5" y="0.5" width="21" height="11" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.4"/>
                    <rect id="battFillIos" x="2" y="2" width="18" height="8" rx="1.8" fill="currentColor"/>
                    <path d="M23 4v4a2.2 2.2 0 0 0 0-4Z" fill="currentColor" fill-opacity="0.4"/>
                  </svg>
                </span>
                <span class="sb-set sb-and">
                  <svg class="sb-ic" width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
                    <path d="M1.2 4.3a9 9 0 0 1 12.6 0L12.5 5.7a7.1 7.1 0 0 0-10 0Z"/>
                    <path d="M3.9 7a5.2 5.2 0 0 1 7.2 0L9.7 8.4a3.2 3.2 0 0 0-4.4 0Z"/>
                    <circle cx="7.5" cy="9.6" r="1.4"/>
                  </svg>
                  <svg class="sb-ic" width="13" height="11" viewBox="0 0 13 11" fill="currentColor">
                    <path d="M13 0v11H0Z"/>
                  </svg>
                  <svg class="sb-ic" width="22" height="11" viewBox="0 0 22 11">
                    <rect x="0.5" y="0.5" width="19" height="10" rx="2" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
                    <rect id="battFillAnd" x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/>
                    <rect x="20.5" y="3.5" width="1.5" height="4" rx="0.7" fill="currentColor" fill-opacity="0.5"/>
                  </svg>
                  <span id="battPct" class="sb-pct">100%</span>
                </span>
              </span>
            </div>

            <span class="cutout" id="cutout">
              <span class="speaker"></span>
              <span class="cam"></span>
            </span>

            <iframe id="viewport" src="about:blank" allowfullscreen
                    allow="autoplay; fullscreen; encrypted-media; picture-in-picture; clipboard-write"></iframe>

            <span class="screen-glare"></span>
            <span class="home-indicator"></span>
          </div>

          <div class="tv-chin">
            <span class="tv-logo">Smart TV</span>
            <span class="tv-led"></span>
          </div>

          <span class="home-btn"><span class="home-square"></span></span>
        </div>

        <div class="tv-stand">
          <span class="tv-neck"></span>
          <span class="tv-base"></span>
        </div>

        <span class="ground"></span>
      </div>
    </div>
  </main>

  <footer id="infoBar">
    <span id="infoName">—</span>
    <span class="sep">·</span>
    <span id="infoViewport">—</span>
    <span class="sep">·</span>
    <span id="infoDpr">—</span>
    <span class="sep">·</span>
    <span id="infoPhysical">—</span>
    <span class="sep">·</span>
    <span id="infoUa" title="">UA: —</span>
  </footer>

  <div id="fpsMeter" class="hidden" title="Desempenho do site embutido — FPS ao vivo, 1% low (pior caso) e tempo médio de quadro">
    <span id="fpsValue">··· FPS</span>
    <span id="fpsDetail"></span>
  </div>

  <div id="toast" class="hidden"></div>

  <script src="preview.js"></script>
</body>
</html>
